<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Glassmorphism Clock</title>
  <style>
    /* 全体のスタイル設定（落ち着いたダークグラデーション） */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e1e1e, #000000);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #ffffff;
    }

    /* 時計を囲む枠（すりガラスデザイン） */
    .clock-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 50px 80px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    /* 時間帯の挨拶 */
    .greeting {
      font-size: 1.2rem;
      color: #dcdcdc;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 5px;
      font-weight: 300;
    }

    /* 時間のスタイル（秒数なしでスッキリと） */
    .time {
      font-size: 7.5rem;
      font-weight: bold;
      letter-spacing: 5px;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    /* 日付と天気を並べるエリア */
    .info-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      font-size: 1.2rem;
      color: #b3b3b3;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* 日付と天気の間の区切り線 */
    .divider {
      color: #555;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="clock-container">
    <div class="greeting" id="greeting">Hello</div>
    <div class="time" id="time">00:00</div>
    <div class="info-bar">
      <div id="date">YYYY/MM/DD (Day)</div>
      <div class="divider">|</div>
      <div id="weather">天気取得中...</div>
    </div>
  </div>

  <script src="my_clock.js"></script>

</body>
</html>
